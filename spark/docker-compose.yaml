version: '3.8'

services:
  spark-master:
    build: .
    container_name: spark-master
    volumes:
      - ./app:/app
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_DAEMON_MEMORY=1G
    deploy:
      resources:
        limits:
          memory: 2G  # El Master no necesita más de 2G para la web

  spark-worker:
    build: .
    container_name: spark-worker
    volumes:
      - ./app:/app
    env_file:
      - .env
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G    # Aquí está tu "músculo"
      - SPARK_WORKER_CORES=2
    deploy:
      resources:
        limits:
          memory: 5G  # Le damos aire para que no colapse